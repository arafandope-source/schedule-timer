<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Schedule Timer">
<title>Schedule Timer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;}
#app{height:100vh;position:relative;overflow:hidden;background:#000;}
canvas{position:absolute;inset:0;width:100%;height:100%;z-index:0;}
.ui{position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:52px 20px 0;}
.wp-dots{display:flex;gap:7px;}
.wp-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.22);cursor:pointer;transition:all .3s;}
.wp-dot.on{background:white;transform:scale(1.35);}
.time-now{font-size:13px;color:rgba(255,255,255,0.4);letter-spacing:.5px;}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 20px 8px;}
.task-chip{background:rgba(255,255,255,0.09);border:0.5px solid rgba(255,255,255,0.18);border-radius:20px;padding:5px 16px;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.55);margin-bottom:16px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.orbit{position:relative;width:250px;height:250px;flex-shrink:0;}
.orbit svg{position:absolute;inset:0;width:100%;height:100%;}
.orbit-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;}
.dig{font-size:74px;font-weight:100;color:white;letter-spacing:-5px;line-height:1;font-variant-numeric:tabular-nums;}
.dig .col{animation:blink 1s step-end infinite;opacity:.45;}
@keyframes blink{0%,100%{opacity:.45}50%{opacity:.1}}
.dig-lbl{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:2.5px;text-transform:uppercase;}
.task-big{font-size:21px;font-weight:200;color:white;margin-top:20px;letter-spacing:-.3px;text-align:center;}
.next-up{font-size:11px;color:rgba(255,255,255,0.32);margin-top:6px;letter-spacing:.3px;}
.ctrl-row{display:flex;gap:16px;margin-top:26px;align-items:center;}
.cbtn{width:58px;height:58px;border-radius:50%;border:0.5px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.08);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:21px;color:white;transition:transform .12s,background .15s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.cbtn:active{transform:scale(0.88);}
.cbtn.big{width:74px;height:74px;font-size:28px;background:rgba(255,149,0,0.25);border-color:rgba(255,149,0,0.45);}
.bottom{background:rgba(0,0,0,0.55);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-top:0.5px solid rgba(255,255,255,0.07);}
.slist{max-height:170px;overflow-y:auto;padding:12px 16px 4px;}
.srow{display:flex;align-items:center;gap:10px;padding:8px 8px;border-radius:11px;cursor:pointer;transition:background .15s;margin-bottom:3px;}
.srow:last-child{margin-bottom:0;}
.srow.act{background:rgba(255,255,255,0.08);}
.srow.done{opacity:.28;}
.sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.sname{flex:1;font-size:14px;color:white;font-weight:300;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.srem{font-size:11px;color:rgba(255,255,255,0.38);font-variant-numeric:tabular-nums;white-space:nowrap;}
.sbar{height:2px;border-radius:1px;margin-top:4px;background:rgba(255,255,255,0.07);}
.sbar-fill{height:100%;border-radius:1px;transition:width 1s linear;}
.addinput{display:flex;gap:8px;padding:10px 16px 32px;}
.addinput input{flex:1;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.14);border-radius:11px;padding:10px 13px;color:white;font-size:14px;outline:none;font-weight:300;-webkit-appearance:none;}
.addinput input::placeholder{color:rgba(255,255,255,0.22);}
.addinput input:focus{border-color:rgba(255,255,255,0.32);}
.mins{width:62px;flex:none;}
.gobtn{background:rgba(255,255,255,0.11);border:0.5px solid rgba(255,255,255,0.2);border-radius:11px;padding:10px 16px;color:white;font-size:16px;font-weight:400;cursor:pointer;flex-shrink:0;}
</style>
</head>
<body>
<div id="app">
  <canvas id="bg"></canvas>
  <div class="ui">
    <div class="topbar">
      <div class="wp-dots" id="wpdots"></div>
      <div class="time-now" id="clockNow"></div>
    </div>
    <div class="hero">
      <div class="task-chip">now playing</div>
      <div class="orbit">
        <svg viewBox="0 0 250 250" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="125" cy="125" r="112" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
          <circle cx="125" cy="125" r="99" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
          <circle id="ringA" cx="125" cy="125" r="112"
            stroke="white" stroke-width="3.5" stroke-linecap="round"
            stroke-dasharray="703.7" stroke-dashoffset="0"
            transform="rotate(-90 125 125)"
            style="transition:stroke-dashoffset 1s linear,stroke .6s ease;"/>
          <circle id="ringB" cx="125" cy="125" r="99"
            stroke="rgba(255,255,255,0.18)" stroke-width="1.5" stroke-linecap="round"
            stroke-dasharray="622.0" stroke-dashoffset="0"
            transform="rotate(-90 125 125)"
            style="transition:stroke-dashoffset 1s linear,stroke .6s ease;"/>
          <circle id="orb" cx="125" cy="13" r="5.5" fill="white" opacity="0.95"/>
        </svg>
        <div class="orbit-center">
          <div class="dig" id="dig">00<span class="col">:</span>00</div>
          <div class="dig-lbl">remaining</div>
        </div>
      </div>
      <div class="task-big" id="tname">—</div>
      <div class="next-up" id="nextup"></div>
      <div class="ctrl-row">
        <button class="cbtn" onclick="resetAll()">↺</button>
        <button class="cbtn big" id="pbtn" onclick="togglePause()">⏸</button>
        <button class="cbtn" onclick="skipBlock()">⏭</button>
      </div>
    </div>
    <div class="bottom">
      <div class="slist" id="slist"></div>
      <div class="addinput">
        <input id="tIn" placeholder="Add a task…"/>
        <input id="mIn" type="number" min="1" max="999" placeholder="min" class="mins"/>
        <button class="gobtn" onclick="addTask()">+</button>
      </div>
    </div>
  </div>
</div>

<script>
function hexRgba(hex,a){
  hex=hex.replace('#','');
  if(hex.length===3)hex=hex.split('').map(x=>x+x).join('');
  const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
  return`rgba(${r},${g},${b},${a})`;
}

const WPS=[
  {name:'Aurora',draw:(c,w,h,t)=>{
    c.fillStyle='#060d18';c.fillRect(0,0,w,h);
    const bands=[['#00ffcc','#0080ff'],['#ff00aa','#7700ff'],['#00aaff','#00ffaa']];
    for(let i=0;i<3;i++){
      const baseY=h*(.18+i*.25);
      for(let x=0;x<=w;x+=3){
        const wave=Math.sin(x/w*6+t/3+i*2.1)*35+Math.sin(x/w*11+t/2.2+i*1.4)*18;
        const y=baseY+wave+Math.sin(t/7+i)*20;
        c.fillStyle=hexRgba(bands[i][0],.055+Math.sin(t/3.5+i+x*.008)*.025);
        c.fillRect(x,y-40,3,80);
      }
    }
    for(let i=0;i<90;i++){
      const x=(Math.sin(i*137.5)*.5+.5)*w,y=(Math.cos(i*97.3)*.5+.5)*h;
      c.beginPath();c.arc(x,y,.6+Math.sin(t/2+i)*.4,0,Math.PI*2);
      c.fillStyle=`rgba(255,255,255,${.18+Math.sin(t/3+i)*.13})`;c.fill();
    }
  }},
  {name:'Void',draw:(c,w,h,t)=>{
    c.fillStyle='#03000e';c.fillRect(0,0,w,h);
    const cx=w*.5,cy=h*.4;
    for(let i=0;i<110;i++){
      const a=i/110*Math.PI*2+t/22,r=15+i*1.9+Math.sin(t/3+i*.2)*10;
      const x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r*.58;
      c.beginPath();c.arc(x,y,.5+Math.sin(t/2+i)*.35,0,Math.PI*2);
      c.fillStyle=`hsla(${268+i*2.5},82%,72%,${.28+Math.sin(t/2+i)*.18})`;c.fill();
    }
    const mg=c.createRadialGradient(cx,cy,0,cx,cy,70);
    mg.addColorStop(0,'rgba(160,0,255,0.32)');mg.addColorStop(1,'transparent');
    c.fillStyle=mg;c.fillRect(0,0,w,h);
    for(let i=0;i<70;i++){
      const x=(Math.sin(i*137.5)*.5+.5)*w,y=(Math.cos(i*97.3)*.5+.5)*h;
      c.beginPath();c.arc(x,y,.5,0,Math.PI*2);
      c.fillStyle=`rgba(255,255,255,${.15+Math.sin(t/3+i)*.1})`;c.fill();
    }
  }},
  {name:'Lava',draw:(c,w,h,t)=>{
    const g=c.createLinearGradient(0,0,0,h);
    g.addColorStop(0,'#0c0000');g.addColorStop(1,'#1a0400');
    c.fillStyle=g;c.fillRect(0,0,w,h);
    for(let i=0;i<20;i++){
      const bx=(i/20)*w+Math.sin(t/3.5+i*.85)*28;
      const by=h-h*.52*(Math.sin(t/3+i*.55)*.5+.5)-18;
      const bh=48+Math.sin(t/2+i)*26;
      const bg=c.createRadialGradient(bx,by,0,bx,by,bh);
      bg.addColorStop(0,`hsla(${18+i*4},100%,62%,${.28+Math.sin(t/2+i)*.1})`);
      bg.addColorStop(.5,`hsla(${8+i*2},90%,36%,.13)`);
      bg.addColorStop(1,'transparent');
      c.fillStyle=bg;c.fillRect(0,0,w,h);
    }
    for(let i=0;i<28;i++){
      const spx=w*.15+Math.sin(i*137+t/4)*w*.7;
      const spy=h-((t*16+i*68)%h);
      c.beginPath();c.arc(spx,spy,.9+Math.sin(i)*.5,0,Math.PI*2);
      c.fillStyle=`rgba(255,${95+Math.sin(i*0.7)*75},0,.72)`;c.fill();
    }
  }},
  {name:'Arctic',draw:(c,w,h,t)=>{
    const g=c.createLinearGradient(0,0,0,h);
    g.addColorStop(0,`hsl(${207+Math.sin(t/10)*4},63%,11%)`);
    g.addColorStop(.6,`hsl(${196+Math.sin(t/8)*5},68%,20%)`);
    g.addColorStop(1,`hsl(${186+Math.sin(t/9)*4},58%,14%)`);
    c.fillStyle=g;c.fillRect(0,0,w,h);
    for(let i=0;i<11;i++){
      c.beginPath();
      const y=h*(.22+i*.09)+Math.sin(t/5+i*.68)*10;
      c.moveTo(0,y);
      for(let x=0;x<=w;x+=6)c.lineTo(x,y+Math.sin((x/w*5+t/4+i))*8+Math.sin((x/w*10+t/3+i*.55))*4);
      c.lineTo(w,h);c.lineTo(0,h);c.closePath();
      c.fillStyle=`hsla(200,78%,${53+i*2.5}%,${.07+i*.014})`;c.fill();
    }
    for(let i=0;i<35;i++){
      const x=(Math.sin(i*73.5)*.5+.5)*w,y=(Math.cos(i*41.3)*.5+.5)*h*.48;
      c.beginPath();c.arc(x,y,1+Math.sin(t/2+i)*.5,0,Math.PI*2);
      c.fillStyle=`rgba(195,238,255,${.28+Math.sin(t/2+i)*.18})`;c.fill();
    }
  }},
  {name:'Neon',draw:(c,w,h,t)=>{
    c.fillStyle='#000410';c.fillRect(0,0,w,h);
    for(let i=0;i<7;i++){
      const lx=w*(.08+i*.14);
      const lg=c.createLinearGradient(lx,0,lx+2,h);
      lg.addColorStop(0,'transparent');
      lg.addColorStop(.5,`hsla(${175+i*38},100%,62%,${.055+Math.sin(t/3+i)*.028})`);
      lg.addColorStop(1,'transparent');
      c.fillStyle=lg;c.fillRect(lx,0,Math.max(1,Math.abs(Math.sin(t/2+i))*2.5),h);
    }
    for(let i=0;i<55;i++){
      const x=(Math.sin(i*137.5)*.5+.5)*w;
      const y=((i/55+t/32)%1)*h;
      c.beginPath();c.arc(x,y,1+Math.sin(t/2+i)*.5,0,Math.PI*2);
      c.fillStyle=`hsla(${178+i*12},100%,68%,${.38+Math.sin(t/2+i)*.22})`;c.fill();
    }
    for(let i=0;i<4;i++){
      const ng=c.createRadialGradient(w*(i*.3+.08),h*.5+Math.sin(t/5+i)*h*.18,0,w*(i*.3+.08),h*.5,110);
      ng.addColorStop(0,`hsla(${165+i*55},100%,58%,${.065+Math.sin(t/4+i)*.035})`);
      ng.addColorStop(1,'transparent');
      c.fillStyle=ng;c.fillRect(0,0,w,h);
    }
  }}
];

let wI=0,tick=0,paused=false,lastTs=null,cur=0,elapsed=0;
let blocks=[
  {name:'Morning stretch',mins:10,color:'#ff9500'},
  {name:'Deep work',mins:90,color:'#bf5af2'},
  {name:'Lunch break',mins:30,color:'#30d158'},
  {name:'Team meeting',mins:45,color:'#0a84ff'},
  {name:'Focus session',mins:60,color:'#ff375f'}
];
const CIRC_A=2*Math.PI*112,CIRC_B=2*Math.PI*99;
const cv=document.getElementById('bg'),ctx=cv.getContext('2d');

function buildDots(){
  document.getElementById('wpdots').innerHTML=WPS.map((w,i)=>
    `<div class="wp-dot ${i===wI?'on':''}" onclick="setWp(${i})" title="${w.name}"></div>`).join('');
}

function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}

function fmt(s){
  const m=Math.floor(s/60),sc=s%60;
  return`${String(m).padStart(2,'0')}<span class="col">:</span>${String(sc).padStart(2,'0')}`;
}
function fmtS(s){
  if(s>=3600){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return`${h}h ${String(m).padStart(2,'0')}m`;}
  const m=Math.floor(s/60),sc=s%60;
  return`${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}

function updateOrb(pct){
  const r=112,cx=125,cy=125;
  const a=-Math.PI/2+(1-pct)*Math.PI*2;
  document.getElementById('orb').setAttribute('cx',(cx+Math.cos(a)*r).toFixed(1));
  document.getElementById('orb').setAttribute('cy',(cy+Math.sin(a)*r).toFixed(1));
}

function renderList(){
  document.getElementById('slist').innerHTML=blocks.map((b,i)=>{
    const rem=i===cur?Math.max(0,b.mins*60-Math.floor(elapsed)):b.mins*60;
    const pct=i===cur?Math.min(100,(elapsed/(b.mins*60))*100).toFixed(1):i<cur?100:0;
    return`<div class="srow ${i===cur?'act':''} ${i<cur?'done':''}" onclick="jumpTo(${i})">
      <div class="sdot" style="background:${b.color}"></div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div class="sname">${b.name}</div>
          <div class="srem">${i<cur?'✓':fmtS(rem)}</div>
        </div>
        <div class="sbar"><div class="sbar-fill" style="width:${pct}%;background:${b.color}"></div></div>
      </div>
    </div>`;
  }).join('');
}

function clockTick(){
  document.getElementById('clockNow').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function frame(ts){
  if(!paused&&lastTs!==null){
    const dt=Math.min((ts-lastTs)/1000,2);
    elapsed+=dt;
    if(blocks[cur]&&elapsed>=blocks[cur].mins*60){elapsed=0;cur=(cur+1)%blocks.length;}
  }
  lastTs=ts;tick+=0.016;
  resize();
  WPS[wI].draw(ctx,cv.width,cv.height,tick);
  const b=blocks[cur];
  if(b){
    const rem=Math.max(0,Math.floor(b.mins*60-elapsed));
    const pct=Math.max(0,1-(elapsed/(b.mins*60)));
    document.getElementById('tname').textContent=b.name;
    document.getElementById('dig').innerHTML=fmt(rem);
    document.getElementById('ringA').style.strokeDashoffset=(CIRC_A*(1-pct)).toFixed(2);
    document.getElementById('ringA').style.stroke=b.color;
    document.getElementById('ringB').style.strokeDashoffset=(CIRC_B*(1-pct)).toFixed(2);
    document.getElementById('ringB').style.stroke=hexRgba(b.color,.28);
    updateOrb(pct);
    const nx=blocks[(cur+1)%blocks.length];
    document.getElementById('nextup').textContent=blocks.length>1?`next: ${nx.name}`:'';
  }
  renderList();
  requestAnimationFrame(frame);
}

function setWp(i){wI=i;buildDots();}
function togglePause(){
  paused=!paused;lastTs=null;
  document.getElementById('pbtn').textContent=paused?'▶':'⏸';
}
function skipBlock(){elapsed=0;cur=(cur+1)%blocks.length;}
function jumpTo(i){cur=i;elapsed=0;}
function resetAll(){cur=0;elapsed=0;paused=false;lastTs=null;document.getElementById('pbtn').textContent='⏸';}
function addTask(){
  const n=document.getElementById('tIn').value.trim();
  const m=parseInt(document.getElementById('mIn').value);
  if(!n||!m||m<1)return;
  const cols=['#ff9500','#bf5af2','#30d158','#0a84ff','#ff375f','#ffd60a','#5ac8fa','#ff6b6b','#34c759'];
  blocks.push({name:n,mins:m,color:cols[blocks.length%cols.length]});
  document.getElementById('tIn').value='';
  document.getElementById('mIn').value='';
}

window.addEventListener('resize',resize);
buildDots();clockTick();setInterval(clockTick,10000);
resize();requestAnimationFrame(frame);
</script>
</body>
</html>
